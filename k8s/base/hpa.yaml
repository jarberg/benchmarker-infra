apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: benchmarker-server
  namespace: benchmarker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: benchmarker-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
