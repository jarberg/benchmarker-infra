apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmarker-server
  namespace: benchmarker
  labels:
    app.kubernetes.io/name: benchmarker-server
    app.kubernetes.io/part-of: benchmarker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: benchmarker-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchmarker-server
    spec:
      serviceAccountName: benchmarker
      containers:
        - name: server
          image: ghcr.io/jarberg/benchmarker-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef: { name: benchmarker-config }
            - secretRef:    { name: benchmarker-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: "2",  memory: 1Gi }
          volumeMounts:
            - name: uploads
              mountPath: /var/lib/benchmarker/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: benchmarker-uploads
