# Bridges the postgres Docker container into the Kubernetes cluster.
# The app connects to postgres.benchmarker.svc.cluster.local — this Service
# and its matching Endpoints make that DNS name resolve to the container's
# IP on the kind network.
#
# Applied automatically by scripts/cluster-up.sh (IP is substituted at runtime).
# Do not apply this file directly — the IP will be wrong.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: benchmarker
spec:
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres
  namespace: benchmarker
subsets:
  - addresses:
      - ip: POSTGRES_IP_PLACEHOLDER
    ports:
      - port: 5432
