apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: benchmarker

resources:
  - ../../base

images:
  - name: ghcr.io/jarberg/benchmarker
    newTag: latest
  - name: ghcr.io/jarberg/benchmarker-worker
    newTag: latest

patches:
  - target: { kind: Deployment, name: benchmarker-server }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: HorizontalPodAutoscaler, name: benchmarker-server }
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
  - target: { kind: Ingress, name: benchmarker }
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.benchmarker.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.benchmarker.example.com
