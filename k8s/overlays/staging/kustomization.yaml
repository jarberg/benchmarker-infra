apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: benchmarker

resources:
  - ../../base

images:
  - name: ghcr.io/example/benchmarker-server
    newName: registry:5000/benchmarker-server
    newTag: staging

patches:
  - target: { kind: Deployment, name: benchmarker-server }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: Ingress, name: benchmarker }
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.benchmarker.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.benchmarker.example.com
