apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: benchmarker

resources:
  - ../../base

images:
  - name: ghcr.io/jarberg/benchmarker
    newTag: latest
  - name: ghcr.io/jarberg/benchmarker-worker
    newTag: latest

patches:
  - target: { kind: Deployment, name: benchmarker-server }
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
