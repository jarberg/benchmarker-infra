apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: benchmarker-bootstrap
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: benchmarker
  source:
    repoURL: https://github.com/jarberg/Benchmarker.git
    targetRevision: main
    path: argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
