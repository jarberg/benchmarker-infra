name: benchmarker

# Standalone worker deployment.
# Requires the root docker-compose.yml (postgres) and server to be running first.
# Scale with: docker compose -f docker-compose.worker.yml up --scale worker=4
services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      BENCHMARKER_ROLE: worker
      DATABASE_URL: ecto://benchmarker:benchmarker@postgres/benchmarker
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-dev-secret-key-base-please-change-me-it-must-be-at-least-64-bytes-long-aaaaaaaaaaa}
      UPLOAD_DIR: /var/lib/benchmarker/uploads
      WORKER_ID: ${WORKER_ID:-worker-1}
      OBAN_CONCURRENCY: ${OBAN_CONCURRENCY:-1}
    volumes: [uploads:/var/lib/benchmarker/uploads]

volumes:
  uploads:

networks:
  default:
    external: true
    name: benchmarker_default
