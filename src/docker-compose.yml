# Docker Compose for the new Elixir stack.
# Postgres is provided by the root docker-compose.yml — start that first.
services:
  server:
    container_name: benchmarker-server
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PHX_HOST: localhost
      PHX_SERVER: "true"
      PORT: "4000"
      DATABASE_URL: ecto://benchmarker:benchmarker@postgres/benchmarker
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-dev-secret-key-base-please-change-me-it-must-be-at-least-64-bytes-long-aaaaaaaaaaa}
      UPLOAD_DIR: /var/lib/benchmarker/uploads
      # No BENCHMARKER_ROLE set → defaults to :web (serves HTTP, empty Oban queues)
    volumes: [uploads:/var/lib/benchmarker/uploads]
    ports: ["4000:4000"]


volumes:
  uploads:

networks:
  default:
    external: true
    name: benchmarker_default
