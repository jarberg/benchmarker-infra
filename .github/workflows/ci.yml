name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Elixir: format + test ─────────────────────────────────────────────────
  elixir:
    name: Elixir (format + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: benchmarker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16.3"
          otp-version: "26.2.5"

      - name: Restore mix deps cache
        uses: actions/cache@v4
        with:
          path: |
            src/deps
            src/_build
          key: mix-${{ runner.os }}-${{ hashFiles('src/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  # ── Frontend: build ───────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/assets

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/assets/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
