name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  server:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: src
          dockerfile: src/Dockerfile
          push: true
          tags: |
            ghcr.io/jarberg/benchmarker:${{ github.sha }}
            ghcr.io/jarberg/benchmarker:latest

  worker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: src
          dockerfile: src/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/jarberg/benchmarker-worker:${{ github.sha }}
            ghcr.io/jarberg/benchmarker-worker:latest
